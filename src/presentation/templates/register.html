{% extends "base.html" %}
{% block content %}
<div class="card">
    <h1>Регистрация</h1>
    <div class="form-group"><label>Email:</label><input type="email" id="email" placeholder="user@example.com"></div>
    <div class="form-group"><label>Пароль:</label><input type="password" id="password" placeholder="Минимум 6 символов"></div>
    <button onclick="register()">Зарегистрироваться</button>
    <div class="error" id="error"></div>
</div>
<script>
async function register() {
    hideError('error');
    try {
        await api('/api/auth/register', 'POST', {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
        });
        window.location.href = '/login';
    } catch (e) { showError('error', e.message); }
}
</script>
{% endblock %}
