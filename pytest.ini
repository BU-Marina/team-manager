[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=short --strict-markers
markers =
    slow: медленные тесты
    unit: модульные тесты (изолированные, без БД)
    integration: интеграционные тесты (с БД, API)
    users: тесты модуля пользователей
    teams: тесты модуля команд
    tasks: тесты модуля задач
    meetings: тесты модуля встреч
    evaluations: тесты модуля оценок
